<svg width="800" height="200" viewBox="0 0 800 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Professional gradients -->
    <linearGradient id="titleGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#cba6f7"/>
      <stop offset="50%" style="stop-color:#89b4fa"/>
      <stop offset="100%" style="stop-color:#74c7ec"/>
    </linearGradient>
    <linearGradient id="accentGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f38ba8"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="backgroundGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e1e2e"/>
      <stop offset="100%" style="stop-color:#181825"/>
    </linearGradient>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Professional gradient background -->
  <rect width="800" height="200" fill="url(#backgroundGradient)"/>

  <!-- Abstract geometric security pattern -->
  <g opacity="0.1">
    <!-- Grid pattern -->
    <defs>
      <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
        <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#cba6f7" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="800" height="200" fill="url(#grid)"/>
  </g>

  <!-- Left side: Abstract security shield -->
  <g transform="translate(120, 60)">
    <!-- Shield base -->
    <path d="M0 30 Q0 10 20 10 L40 10 Q60 10 60 30 L60 50 Q60 80 30 80 Q0 80 0 50 Z"
          fill="url(#accentGradient)" opacity="0.3"/>
    <!-- Shield details -->
    <rect x="15" y="25" width="30" height="2" rx="1" fill="#89b4fa" opacity="0.6"/>
    <rect x="15" y="35" width="25" height="2" rx="1" fill="#74c7ec" opacity="0.6"/>
    <rect x="15" y="45" width="20" height="2" rx="1" fill="#cba6f7" opacity="0.6"/>
    <!-- Lock symbol -->
    <circle cx="30" cy="55" r="4" fill="none" stroke="#f38ba8" stroke-width="1.5" opacity="0.7"/>
    <rect x="27" y="55" width="6" height="4" rx="1" fill="#f38ba8" opacity="0.7"/>
  </g>

  <!-- Right side: Network nodes -->
  <g transform="translate(650, 70)" opacity="0.4">
    <!-- Nodes -->
    <circle cx="0" cy="0" r="3" fill="#89b4fa"/>
    <circle cx="25" cy="-10" r="2.5" fill="#74c7ec"/>
    <circle cx="15" cy="20" r="2" fill="#cba6f7"/>
    <circle cx="40" cy="15" r="2.5" fill="#f38ba8"/>
    <!-- Connections -->
    <line x1="0" y1="0" x2="25" y2="-10" stroke="#89b4fa" stroke-width="1"/>
    <line x1="0" y1="0" x2="15" y2="20" stroke="#74c7ec" stroke-width="1"/>
    <line x1="25" y1="-10" x2="40" y2="15" stroke="#cba6f7" stroke-width="1"/>
  </g>

  <!-- Main title -->
  <text x="400" y="85" font-family="Space Grotesk, system-ui, sans-serif" font-size="52" font-weight="700"
        fill="url(#titleGradient)" text-anchor="middle" filter="url(#softGlow)">
    Armsforge
  </text>

  <!-- Professional subtitle -->
  <text x="400" y="115" font-family="Outfit, system-ui, sans-serif" font-size="16" font-weight="600"
        fill="#bac2de" text-anchor="middle" opacity="0.9" letter-spacing="2px">
    ENTERPRISE SECURITY PLATFORM
  </text>

  <!-- AI Integration indicator -->
  <text x="400" y="135" font-family="Outfit, system-ui, sans-serif" font-size="12" font-weight="500"
        fill="#74c7ec" text-anchor="middle" opacity="0.7" letter-spacing="1px">
    AI-Powered • Claude Code Integration
  </text>

  <!-- Professional accent line -->
  <line x1="250" y1="155" x2="550" y2="155" stroke="url(#accentGradient)" stroke-width="2" opacity="0.6"/>

  <!-- Subtle corner accents -->
  <g opacity="0.3">
    <!-- Top left -->
    <rect x="30" y="30" width="15" height="2" rx="1" fill="#cba6f7"/>
    <rect x="30" y="35" width="10" height="2" rx="1" fill="#89b4fa"/>

    <!-- Top right -->
    <rect x="755" y="30" width="15" height="2" rx="1" fill="#f38ba8"/>
    <rect x="760" y="35" width="10" height="2" rx="1" fill="#cba6f7"/>

    <!-- Bottom left -->
    <rect x="30" y="165" width="10" height="2" rx="1" fill="#74c7ec"/>
    <rect x="30" y="170" width="15" height="2" rx="1" fill="#89b4fa"/>

    <!-- Bottom right -->
    <rect x="760" y="165" width="10" height="2" rx="1" fill="#f38ba8"/>
    <rect x="755" y="170" width="15" height="2" rx="1" fill="#cba6f7"/>
  </g>

</svg>