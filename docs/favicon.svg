<svg width="32" height="32" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Catppuccin Mocha colors for favicon -->
    <linearGradient id="swordGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f38ba8"/>
      <stop offset="100%" style="stop-color:#cba6f7"/>
    </linearGradient>
    <linearGradient id="handleGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#585b70"/>
      <stop offset="100%" style="stop-color:#45475a"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#1e1e2e" stroke="#313244" stroke-width="1"/>

  <!-- Simplified sword design for favicon -->
  <!-- Sword blade -->
  <path d="M12 8 L20 4 L22 6 L24 4 L20 16 L12 12 Z" fill="url(#swordGradient)"/>

  <!-- Sword handle -->
  <rect x="10" y="16" width="8" height="2" rx="1" fill="url(#handleGradient)"/>
  <rect x="8" y="14" width="12" height="1.5" rx="0.75" fill="#7f849c"/>

  <!-- Simple spark effect -->
  <circle cx="18" cy="10" r="1" fill="#f9e2af" opacity="0.9"/>
  <circle cx="15" cy="13" r="0.5" fill="#fab387" opacity="0.8"/>

  <!-- Forge anvil base (simplified) -->
  <rect x="6" y="24" width="20" height="3" rx="1" fill="#45475a" opacity="0.6"/>
</svg>