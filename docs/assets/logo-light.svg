  <text x="210" y="100" text-anchor="middle" font-family="'JetBrains Mono', 'SF Mono', 'Fira Code', monospace" font-size="7.5" font-weight="400" fill="#9ca0b0" letter-spacing="3">TYPESCRIPT · CLAUDE · AUTOMATION</text>
