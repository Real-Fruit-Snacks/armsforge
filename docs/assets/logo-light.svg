<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220" fill="none">
  <defs>
    <!-- Primary gradient: deep orange to amber -->
    <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="40%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Accent gradient -->
    <linearGradient id="g2" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#d97706"/>
      <stop offset="100%" stop-color="#ea580c"/>
    </linearGradient>

    <!-- Icon gradient: vertical for the mark -->
    <linearGradient id="g3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ea580c"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>

    <!-- Faint outer glow -->
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="6" result="blur"/>
      <feFlood flood-color="#ea580c" flood-opacity="0.1" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="shadow"/>
      <feComposite in="SourceGraphic" in2="shadow" operator="over"/>
    </filter>
  </defs>

  <!-- ===================== LOGOMARK ===================== -->
  <g transform="translate(58, 40)" filter="url(#softglow)">

    <!-- Hexagonal frame — thin, elegant -->
    <path d="M 80 6 L 140 38 L 140 102 L 80 134 L 20 102 L 20 38 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.35"/>

    <!-- Inner hex subtle fill -->
    <path d="M 80 14 L 134 42 L 134 98 L 80 126 L 26 98 L 26 42 Z"
          fill="#ea580c" opacity="0.04"/>

    <!-- === LOGOMARK: The Forge — Anvil with hammer and sparks === -->

    <!-- Anvil base -->
    <path d="M 60 88 L 56 80 L 64 74 L 96 74 L 104 80 L 100 88 Z"
          fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
    <!-- Anvil horn (left) -->
    <path d="M 64 74 L 52 70 L 54 74"
          fill="none" stroke="#ea580c" stroke-width="1" opacity="0.6"/>
    <!-- Anvil top surface -->
    <line x1="64" y1="74" x2="96" y2="74" stroke="#d97706" stroke-width="0.8" opacity="0.5"/>

    <!-- Hammer striking downward -->
    <rect x="74" y="42" width="12" height="10" rx="1.5"
          fill="none" stroke="url(#g1)" stroke-width="1.2" opacity="0.7"/>
    <!-- Hammer handle -->
    <line x1="80" y1="42" x2="80" y2="30" stroke="#ea580c" stroke-width="1.2" opacity="0.55"/>

    <!-- Impact point -->
    <circle cx="80" cy="72" r="2.5" fill="#d97706" opacity="0.6"/>

    <!-- Spark particles radiating from impact -->
    <circle cx="66" cy="62" r="1.5" fill="#ea580c" opacity="0.5"/>
    <circle cx="92" cy="60" r="1.3" fill="#d97706" opacity="0.45"/>
    <circle cx="62" cy="56" r="1.1" fill="#ea580c" opacity="0.35"/>
    <circle cx="96" cy="64" r="1.2" fill="#d97706" opacity="0.4"/>
    <circle cx="72" cy="52" r="1" fill="#ea580c" opacity="0.3"/>
    <circle cx="100" cy="56" r="0.9" fill="#d97706" opacity="0.3"/>
    <circle cx="58" cy="66" r="0.8" fill="#ea580c" opacity="0.25"/>
    <circle cx="88" cy="50" r="1.1" fill="#d97706" opacity="0.35"/>
    <circle cx="70" cy="46" r="0.9" fill="#ea580c" opacity="0.25"/>
    <circle cx="102" cy="50" r="0.8" fill="#d97706" opacity="0.2"/>

    <!-- Spark lines -->
    <line x1="80" y1="70" x2="70" y2="58" stroke="#ea580c" stroke-width="0.5" opacity="0.3"/>
    <line x1="80" y1="70" x2="90" y2="56" stroke="#d97706" stroke-width="0.5" opacity="0.3"/>
    <line x1="80" y1="70" x2="64" y2="64" stroke="#ea580c" stroke-width="0.4" opacity="0.2"/>
    <line x1="80" y1="70" x2="94" y2="62" stroke="#d97706" stroke-width="0.4" opacity="0.2"/>

    <!-- Corner accents on hex -->
    <circle cx="80" cy="6" r="2" fill="#ea580c" opacity="0.25"/>
    <circle cx="80" cy="134" r="2" fill="#d97706" opacity="0.25"/>
  </g>

  <!-- ===================== TYPOGRAPHY ===================== -->

  <!-- "ARMSFORGE" — clean, bold, wide-tracked -->
  <text x="415" y="108"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', 'Helvetica Neue', Arial, sans-serif"
        font-size="52" font-weight="800" letter-spacing="10"
        fill="url(#g1)" text-anchor="middle">ARMSFORGE</text>

  <!-- Thin separator line -->
  <line x1="280" y1="128" x2="550" y2="128"
        stroke="url(#g1)" stroke-width="0.8" opacity="0.2"/>

  <!-- Tagline — refined, subtle -->
  <text x="415" y="152"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace"
        font-size="11.5" font-weight="400" letter-spacing="5.5"
        fill="#57534e" text-anchor="middle">AI SECURITY PLATFORM</text>

  <!-- Descriptor — very subtle -->
  <text x="415" y="172"
        font-family="'SF Mono', 'JetBrains Mono', 'Fira Code', monospace"
        font-size="9" font-weight="400" letter-spacing="3"
        fill="#a8a29e" text-anchor="middle">TYPESCRIPT  ·  CLAUDE  ·  AUTOMATION</text>
</svg>
