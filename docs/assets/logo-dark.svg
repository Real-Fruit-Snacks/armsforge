<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 220">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fab387"/>
      <stop offset="100%" stop-color="#f9e2af"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#fab387"/>
      <stop offset="100%" stop-color="#f9e2af"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="720" height="220" fill="#11111b" rx="8"/>

  <!-- Hexagonal Frame -->
  <g transform="translate(100, 110)" filter="url(#softGlow)">
    <polygon points="0,-72 62.4,-36 62.4,36 0,72 -62.4,36 -62.4,-36"
             fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4"/>

    <!-- Center node -->
    <circle cx="0" cy="0" r="2" fill="#fab387" opacity="0.6"/>
    <!-- Entry node (left) -->
    <circle cx="-62.4" cy="0" r="2" fill="#fab387" opacity="0.5"/>
    <!-- Exit node (right) -->
    <circle cx="62.4" cy="0" r="2" fill="#fab387" opacity="0.5"/>

    <!-- Particle dots on hex edges -->
    <circle cx="31.2" cy="-54" r="1.2" fill="#f9e2af" opacity="0.35"/>
    <circle cx="-31.2" cy="-54" r="1.2" fill="#fab387" opacity="0.3"/>
    <circle cx="31.2" cy="54" r="1.2" fill="#f9e2af" opacity="0.3"/>
    <circle cx="-31.2" cy="54" r="1.2" fill="#fab387" opacity="0.35"/>
    <circle cx="-55" cy="-18" r="1" fill="#f9e2af" opacity="0.25"/>
    <circle cx="55" cy="18" r="1" fill="#fab387" opacity="0.25"/>

    <!-- LOGOMARK: The Forge - Anvil with hammer and sparks -->
    <!-- Anvil base -->
    <path d="M-20,18 L-24,10 L-16,4 L16,4 L24,10 L20,18 Z" fill="none" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.7"/>
    <!-- Anvil horn (left) -->
    <path d="M-16,4 L-28,0 L-26,4" fill="none" stroke="#fab387" stroke-width="1" opacity="0.6"/>
    <!-- Anvil top surface -->
    <line x1="-16" y1="4" x2="16" y2="4" stroke="#f9e2af" stroke-width="0.8" opacity="0.5"/>

    <!-- Hammer striking downward -->
    <rect x="-6" y="-28" width="12" height="10" rx="1.5" fill="none" stroke="url(#accentGrad)" stroke-width="1.2" opacity="0.7"/>
    <!-- Hammer handle -->
    <line x1="0" y1="-28" x2="0" y2="-40" stroke="#fab387" stroke-width="1.2" opacity="0.55"/>

    <!-- Impact point -->
    <circle cx="0" cy="2" r="2.5" fill="#f9e2af" opacity="0.6"/>

    <!-- Spark particles radiating from impact -->
    <circle cx="-14" cy="-8" r="1.5" fill="#fab387" opacity="0.55"/>
    <circle cx="12" cy="-10" r="1.3" fill="#f9e2af" opacity="0.5"/>
    <circle cx="-18" cy="-14" r="1.1" fill="#fab387" opacity="0.4"/>
    <circle cx="16" cy="-6" r="1.2" fill="#f9e2af" opacity="0.45"/>
    <circle cx="-8" cy="-18" r="1" fill="#fab387" opacity="0.35"/>
    <circle cx="20" cy="-14" r="0.9" fill="#f9e2af" opacity="0.35"/>
    <circle cx="-22" cy="-4" r="0.8" fill="#fab387" opacity="0.3"/>
    <circle cx="8" cy="-20" r="1.1" fill="#f9e2af" opacity="0.4"/>
    <circle cx="-10" cy="-24" r="0.9" fill="#fab387" opacity="0.3"/>
    <circle cx="22" cy="-20" r="0.8" fill="#f9e2af" opacity="0.25"/>

    <!-- Spark lines -->
    <line x1="0" y1="0" x2="-10" y2="-12" stroke="#fab387" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="10" y2="-14" stroke="#f9e2af" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="0" x2="-16" y2="-6" stroke="#fab387" stroke-width="0.4" opacity="0.2"/>
    <line x1="0" y1="0" x2="14" y2="-8" stroke="#f9e2af" stroke-width="0.4" opacity="0.2"/>
  </g>

  <!-- Typography -->
  <g transform="translate(200, 0)">
    <!-- Project Name -->
    <text x="0" y="92" font-family="'Inter','Segoe UI','Helvetica Neue',Arial,sans-serif" font-size="52" font-weight="800" fill="url(#textGrad)" letter-spacing="3">ARMSFORGE</text>

    <!-- Separator line -->
    <line x1="0" y1="108" x2="340" y2="108" stroke="url(#accentGrad)" stroke-width="0.8" opacity="0.4"/>

    <!-- Tagline -->
    <text x="0" y="132" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="11.5" fill="#cdd6f4" letter-spacing="2" opacity="0.85">AI SECURITY PLATFORM</text>

    <!-- Descriptor -->
    <text x="0" y="152" font-family="'JetBrains Mono','Fira Code','Cascadia Code',monospace" font-size="9" fill="#a6adc8" letter-spacing="2.5" opacity="0.6">TYPESCRIPT · CLAUDE · AUTOMATION</text>
  </g>
</svg>